// Default contacted state — first 31 leads already messaged, Steven Lepke + 6 new leads are not contacted
const defaultContacted = {};
for (let i = 0; i < 31; i++) { defaultContacted[i] = { date: "2026-03-30T00:00:00.000Z" }; }

// Merge: localStorage wins if it exists AND has entries, otherwise use defaults
const stored = JSON.parse(localStorage.getItem('outreach_contacted_v3') || '{}');
let contactedState = Object.keys(stored).length > 0 ? stored : defaultContacted;
localStorage.setItem('outreach_contacted_v3', JSON.stringify(contactedState));

// Deleted leads (persisted)
let deletedState = JSON.parse(localStorage.getItem('outreach_deleted_v1') || '{}');
let deleteMode = false;
let selectedForDelete = {};
let currentTab = 'queue';

function activeLeadCount() {
  return leads.filter((_, i) => !deletedState[i]).length;
}

function updateMetrics() {
  const deleted = Object.keys(deletedState).length;
  const contacted = Object.keys(contactedState).filter(k => !deletedState[k]).length;
  const total = leads.length - deleted;
  const remaining = total - contacted;
  const pct = total > 0 ? Math.round((contacted / total) * 100) : 0;

  document.getElementById('m-total').textContent = total;
  document.getElementById('m-sent').textContent = contacted;
  document.getElementById('m-remaining').textContent = remaining;
  document.getElementById('m-rate').textContent = pct + '%';
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('tc-queue').textContent = remaining;
  document.getElementById('tc-contacted').textContent = contacted;

  if (remaining === 0 && total > 0) document.getElementById('m-remaining').style.color = '#00d4aa';
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-queue').classList.toggle('active', tab === 'queue');
  document.getElementById('tab-contacted').classList.toggle('active', tab === 'contacted');
  document.getElementById('queue-view').style.display = tab === 'queue' ? 'block' : 'none';
  document.getElementById('contacted-view').style.display = tab === 'contacted' ? 'block' : 'none';
  render();
}

function render() {
  const queueContainer = document.getElementById('leads');
  const contactedContainer = document.getElementById('contacted-leads');
  queueContainer.innerHTML = '';
  contactedContainer.innerHTML = '';

  let queueNum = 0;
  let contactedNum = 0;
  const dmClass = deleteMode ? ' delete-active' : '';

  leads.forEach((lead, i) => {
    if (deletedState[i]) return;
    const isContacted = contactedState[i];
    const isSelected = selectedForDelete[i];
    const checkbox = `<input type="checkbox" class="lead-checkbox" ${isSelected ? 'checked' : ''} onchange="toggleSelect(${i}, this.checked)">`;

    if (!isContacted) {
      queueNum++;
      const card = document.createElement('div');
      card.className = 'lead-card' + dmClass + (isSelected ? ' selected' : '');
      card.innerHTML = `
        ${checkbox}
        <div class="lead-info">
          <div class="lead-row">
            <span class="lead-num">${String(queueNum).padStart(2, '0')}</span>
            <span class="lead-name">${lead.name}</span>
          </div>
          <div class="lead-title"><span class="lead-company">${lead.company || 'undefined'}</span> — ${lead.title}</div>
        </div>
        <div style="display:flex;gap:6px;">
          <button class="btn-copy" onclick="copyMsg(${i})">Copy</button>
          <button class="btn-contacted" onclick="markContacted(${i})">Contacted</button>
        </div>
      `;
      queueContainer.appendChild(card);
    } else {
      contactedNum++;
      const card = document.createElement('div');
      card.className = 'lead-card copied' + dmClass + (isSelected ? ' selected' : '');
      card.innerHTML = `
        ${checkbox}
        <div class="lead-info">
          <div class="lead-row">
            <span class="lead-num">${String(contactedNum).padStart(2, '0')}</span>
            <span class="lead-name">${lead.name}</span>
          </div>
          <div class="lead-title"><span class="lead-company">${lead.company || 'undefined'}</span> — ${lead.title}</div>
        </div>
        <button class="btn-undo" onclick="undoContacted(${i})">Undo</button>
      `;
      contactedContainer.appendChild(card);
    }
  });

  const emptyMsg = document.getElementById('empty-contacted');
  if (contactedNum === 0) emptyMsg.style.display = 'block';
  else emptyMsg.style.display = 'none';

  updateDeleteUI();
  updateMetrics();
}

function copyMsg(i) {
  const lead = leads[i];
  const firstName = lead.name.split(' ')[0];
  const tpl = lead.company ? templateCompany : templateBackground;
  const msg = tpl
    .replace(/{name}/g, firstName)
    .replace(/{company}/g, lead.company || '')
    .replace(/{background}/g, lead.background || '')
    .replace(/{compliment}/g, lead.compliment);

  navigator.clipboard.writeText(msg).then(() => {
    // Brief visual feedback
    event.target.textContent = 'Copied!';
    event.target.classList.add('done');
    setTimeout(() => {
      event.target.textContent = 'Copy';
      event.target.classList.remove('done');
    }, 1500);
  });
}

function markContacted(i) {
  contactedState[i] = { date: new Date().toISOString() };
  localStorage.setItem('outreach_contacted_v3', JSON.stringify(contactedState));
  render();
}

function undoContacted(i) {
  delete contactedState[i];
  localStorage.setItem('outreach_contacted_v3', JSON.stringify(contactedState));
  render();
}

function toggleDeleteMode() {
  deleteMode = !deleteMode;
  selectedForDelete = {};
  document.getElementById('btn-dm').classList.toggle('active', deleteMode);
  document.getElementById('btn-sa').style.display = deleteMode ? 'inline-block' : 'none';
  document.getElementById('btn-sa').classList.remove('active');
  render();
}

function toggleSelect(i, checked) {
  if (checked) selectedForDelete[i] = true;
  else delete selectedForDelete[i];
  updateDeleteUI();
  // Update card highlight without full re-render
  document.querySelectorAll('.lead-card').forEach(card => {
    const cb = card.querySelector('.lead-checkbox');
    if (cb) card.classList.toggle('selected', cb.checked);
  });
}

function toggleSelectAll() {
  const visibleIndices = [];
  leads.forEach((_, i) => {
    if (deletedState[i]) return;
    const inQueue = !contactedState[i] && currentTab === 'queue';
    const inContacted = contactedState[i] && currentTab === 'contacted';
    if (inQueue || inContacted) visibleIndices.push(i);
  });

  const allSelected = visibleIndices.every(i => selectedForDelete[i]);
  if (allSelected) {
    visibleIndices.forEach(i => delete selectedForDelete[i]);
    document.getElementById('btn-sa').classList.remove('active');
  } else {
    visibleIndices.forEach(i => selectedForDelete[i] = true);
    document.getElementById('btn-sa').classList.add('active');
  }
  render();
}

function updateDeleteUI() {
  const count = Object.keys(selectedForDelete).length;
  const btnCD = document.getElementById('btn-cd');
  const delCount = document.getElementById('delete-count');
  if (deleteMode && count > 0) {
    btnCD.style.display = 'inline-block';
    btnCD.textContent = `Delete Selected (${count})`;
    delCount.style.display = 'inline';
    delCount.textContent = `${count} selected`;
  } else {
    btnCD.style.display = 'none';
    delCount.style.display = 'none';
  }
}

function confirmDelete() {
  const count = Object.keys(selectedForDelete).length;
  if (!confirm(`Permanently delete ${count} lead${count > 1 ? 's' : ''}?`)) return;
  Object.keys(selectedForDelete).forEach(i => {
    deletedState[i] = true;
    delete contactedState[i];
  });
  localStorage.setItem('outreach_deleted_v1', JSON.stringify(deletedState));
  localStorage.setItem('outreach_contacted_v3', JSON.stringify(contactedState));
  selectedForDelete = {};
  deleteMode = false;
  document.getElementById('btn-dm').classList.remove('active');
  document.getElementById('btn-sa').style.display = 'none';
  render();
}

function resetAll() {
  if (confirm('Reset all contacted status?')) {
    contactedState = {};
    localStorage.removeItem('outreach_contacted_v3');
    render();
  }
}

render();

// Register service worker for PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/outreach-sw.js').catch(() => {});
}
</script>
