<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tethron Outreach">
<meta name="theme-color" content="#050508">
<link rel="manifest" href="/outreach-manifest.json">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<title>Tethron — Outreach Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #050508; color: #fff; font-family: 'Inter', -apple-system, sans-serif; min-height: 100vh; }

/* Noise bg */
body::before { content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E"); background-repeat: repeat; background-size: 256px 256px; }

.container { max-width: 900px; margin: 0 auto; padding: 48px 24px; position: relative; z-index: 1; }

/* Header */
.header { margin-bottom: 40px; }
.header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
.logo { width: 32px; height: 32px; background: linear-gradient(135deg, #00d4aa, #00b894); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 16px; color: #050508; }
.header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
.header h1 span { color: rgba(255,255,255,0.3); }
.header-sub { font-size: 13px; color: rgba(255,255,255,0.35); margin-top: 4px; }

/* Metrics Bar */
.metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 36px; }
.metric-card {
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px;
  padding: 16px 18px;
  text-align: center;
}
.metric-value { font-size: 28px; font-weight: 800; letter-spacing: -1px; color: #00d4aa; }
.metric-value.white { color: #fff; }
.metric-value.orange { color: #f59e0b; }
.metric-value.red { color: #ef4444; }
.metric-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.2px; color: rgba(255,255,255,0.3); margin-top: 4px; }

/* Progress Bar */
.progress-wrap { margin-bottom: 36px; }
.progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.progress-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.2px; color: rgba(255,255,255,0.4); }
.progress-pct { font-size: 13px; font-weight: 700; color: #00d4aa; }
.progress-bar { height: 6px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #00d4aa, #00b894); border-radius: 3px; transition: width 0.5s ease; }

/* Section Label */
.section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.8px; color: rgba(0,212,170,0.5); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.section-label::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.04); }

/* Lead Cards */
.lead-card {
  background: rgba(255,255,255,0.015);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 12px;
  padding: 16px 20px;
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  transition: all 0.25s;
}
.lead-card:hover { border-color: rgba(0,212,170,0.15); background: rgba(255,255,255,0.025); }
.lead-card.copied { border-color: rgba(0,212,170,0.3); background: rgba(0,212,170,0.02); }
.lead-info { flex: 1; min-width: 0; }
.lead-row { display: flex; align-items: center; gap: 10px; }
.lead-num { font-size: 10px; font-weight: 700; color: rgba(0,212,170,0.3); min-width: 20px; }
.lead-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.lead-title { font-size: 11.5px; color: rgba(255,255,255,0.35); line-height: 1.4; margin-top: 2px; padding-left: 30px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.lead-company { color: rgba(0,212,170,0.7); font-weight: 500; }

.btn-copy {
  padding: 7px 18px;
  background: rgba(255,255,255,0.04);
  color: rgba(255,255,255,0.5);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
  flex-shrink: 0;
  letter-spacing: 0.3px;
}
.btn-copy:hover { background: rgba(0,212,170,0.1); border-color: rgba(0,212,170,0.25); color: #00d4aa; }
.btn-copy.done { background: rgba(0,212,170,0.15); color: #00d4aa; border-color: rgba(0,212,170,0.3); }

/* Tabs */
.tabs { display: flex; gap: 4px; margin-bottom: 20px; background: rgba(255,255,255,0.03); border-radius: 10px; padding: 3px; }
.tab { flex: 1; padding: 10px 16px; background: none; border: none; color: rgba(255,255,255,0.35); font-size: 12px; font-weight: 600; cursor: pointer; border-radius: 8px; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
.tab.active { background: rgba(0,212,170,0.1); color: #00d4aa; }
.tab:hover:not(.active) { color: rgba(255,255,255,0.6); }
.tab-count { background: rgba(255,255,255,0.08); padding: 2px 8px; border-radius: 10px; font-size: 11px; }
.tab.active .tab-count { background: rgba(0,212,170,0.2); }

/* Contacted button */
.btn-contacted {
  padding: 7px 14px;
  background: none;
  color: rgba(255,255,255,0.3);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
  flex-shrink: 0;
}
.btn-contacted:hover { border-color: rgba(0,212,170,0.25); color: #00d4aa; }

/* Undo button (on contacted page) */
.btn-undo {
  padding: 7px 14px;
  background: none;
  color: rgba(255,255,255,0.25);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px;
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
  flex-shrink: 0;
}
.btn-undo:hover { border-color: rgba(239,68,68,0.3); color: #ef4444; }

.empty-state { text-align: center; padding: 48px 24px; color: rgba(255,255,255,0.2); font-size: 13px; }

/* Reset button */
.reset-btn { margin-top: 24px; padding: 8px 16px; background: none; border: 1px solid rgba(255,255,255,0.06); color: rgba(255,255,255,0.25); font-size: 11px; font-weight: 500; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
.reset-btn:hover { border-color: rgba(239,68,68,0.3); color: #ef4444; }

/* Delete mode */
.delete-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
.btn-delete-mode {
  padding: 8px 16px; background: none; border: 1px solid rgba(255,255,255,0.06); color: rgba(255,255,255,0.35);
  font-size: 11px; font-weight: 600; border-radius: 8px; cursor: pointer; transition: all 0.2s;
}
.btn-delete-mode:hover { border-color: rgba(239,68,68,0.3); color: #ef4444; }
.btn-delete-mode.active { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.4); color: #ef4444; }
.btn-select-all {
  padding: 8px 16px; background: none; border: 1px solid rgba(255,255,255,0.06); color: rgba(255,255,255,0.35);
  font-size: 11px; font-weight: 600; border-radius: 8px; cursor: pointer; transition: all 0.2s; display: none;
}
.btn-select-all:hover { border-color: rgba(245,158,11,0.3); color: #f59e0b; }
.btn-select-all.active { background: rgba(245,158,11,0.1); border-color: rgba(245,158,11,0.4); color: #f59e0b; }
.btn-confirm-delete {
  padding: 8px 16px; background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.4); color: #ef4444;
  font-size: 11px; font-weight: 700; border-radius: 8px; cursor: pointer; transition: all 0.2s; display: none;
}
.btn-confirm-delete:hover { background: rgba(239,68,68,0.25); }
.delete-count { font-size: 11px; color: rgba(239,68,68,0.6); display: none; }
.lead-card.selected { border-color: rgba(239,68,68,0.4); background: rgba(239,68,68,0.04); }
.lead-checkbox { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.15); border-radius: 4px; cursor: pointer; display: none; flex-shrink: 0; transition: all 0.2s; appearance: none; -webkit-appearance: none; background: none; }
.lead-checkbox:checked { background: #ef4444; border-color: #ef4444; }
.lead-checkbox:checked::after { content: '\2713'; color: #fff; font-size: 12px; display: flex; align-items: center; justify-content: center; height: 100%; }
.delete-active .lead-checkbox { display: block; }

/* Follow-Up Tab Styles */
.fu-filters { display: flex; gap: 4px; margin-bottom: 16px; background: rgba(255,255,255,0.03); border-radius: 10px; padding: 3px; flex-wrap: wrap; }
.fu-filter { flex: 1; padding: 8px 10px; background: none; border: none; color: rgba(255,255,255,0.35); font-size: 11px; font-weight: 600; cursor: pointer; border-radius: 8px; transition: all 0.2s; text-align: center; min-width: 55px; }
.fu-filter.active { background: rgba(0,212,170,0.1); color: #00d4aa; }
.fu-filter:hover:not(.active) { color: rgba(255,255,255,0.6); }

.fu-card { background: rgba(255,255,255,0.015); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 16px 18px; margin-bottom: 8px; transition: all 0.25s; }
.fu-card:hover { border-color: rgba(0,212,170,0.15); background: rgba(255,255,255,0.025); }
.fu-card.fu-overdue { border-left: 3px solid #ef4444; }
.fu-card.fu-due-today { border-left: 3px solid #f59e0b; }
.fu-card.fu-upcoming { border-left: 3px solid #00d4aa; }
.fu-card.fu-done { border-left: 3px solid rgba(255,255,255,0.1); opacity: 0.5; }

.fu-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 8px; }
.fu-name { font-size: 14px; font-weight: 700; }
.fu-company { font-size: 11.5px; color: rgba(0,212,170,0.7); font-weight: 500; margin-top: 2px; }
.fu-badge { padding: 3px 8px; border-radius: 5px; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; flex-shrink: 0; }
.fu-badge.fu-overdue { background: rgba(239,68,68,0.15); color: #ef4444; }
.fu-badge.fu-due-today { background: rgba(245,158,11,0.15); color: #f59e0b; }
.fu-badge.fu-upcoming { background: rgba(0,212,170,0.1); color: #00d4aa; }
.fu-badge.fu-done { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.3); }

.fu-details { display: flex; flex-wrap: wrap; gap: 14px; margin-bottom: 8px; font-size: 11px; color: rgba(255,255,255,0.4); }
.fu-details strong { color: rgba(255,255,255,0.6); }
.fu-action { font-size: 12px; color: rgba(255,255,255,0.65); background: rgba(255,255,255,0.03); border-radius: 6px; padding: 6px 10px; margin-bottom: 8px; }
.fu-action::before { content: '\2192 '; color: #00d4aa; font-weight: 700; }
.fu-notes { font-size: 11px; color: rgba(255,255,255,0.28); line-height: 1.4; margin-bottom: 10px; font-style: italic; }
.fu-btns { display: flex; gap: 6px; flex-wrap: wrap; }
.fu-btn { padding: 6px 14px; border-radius: 7px; font-size: 10px; font-weight: 600; cursor: pointer; border: 1px solid rgba(255,255,255,0.08); transition: all 0.2s; }
.fu-btn-primary { background: rgba(0,212,170,0.12); color: #00d4aa; border-color: rgba(0,212,170,0.25); }
.fu-btn-primary:hover { background: rgba(0,212,170,0.2); }
.fu-btn-snooze { background: rgba(245,158,11,0.1); color: #f59e0b; border-color: rgba(245,158,11,0.2); }
.fu-btn-done { background: rgba(0,212,170,0.15); color: #00d4aa; border-color: rgba(0,212,170,0.3); }
.fu-btn-secondary { background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.5); }
.fu-btn-secondary:hover { background: rgba(255,255,255,0.08); }

.fu-add-btn { padding: 8px 18px; background: linear-gradient(135deg, rgba(0,212,170,0.15), rgba(0,184,148,0.15)); border: 1px solid rgba(0,212,170,0.2); color: #00d4aa; border-radius: 8px; font-size: 11px; font-weight: 700; cursor: pointer; margin-bottom: 16px; transition: all 0.2s; }
.fu-add-btn:hover { background: linear-gradient(135deg, rgba(0,212,170,0.25), rgba(0,184,148,0.25)); }
.fu-form { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 18px; margin-bottom: 16px; display: none; }
.fu-form.show { display: block; }
.fu-form h3 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: #00d4aa; }
.fu-row { display: flex; gap: 10px; margin-bottom: 10px; }
.fu-row input, .fu-row select, .fu-row textarea { flex: 1; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 7px; padding: 9px 12px; color: #fff; font-family: inherit; font-size: 12px; outline: none; }
.fu-row input::placeholder, .fu-row textarea::placeholder { color: rgba(255,255,255,0.25); }
.fu-row input:focus, .fu-row select:focus, .fu-row textarea:focus { border-color: rgba(0,212,170,0.3); }
.fu-row select { appearance: none; cursor: pointer; }
.fu-row select option { background: #1a1a2e; color: #fff; }
.fu-row textarea { min-height: 50px; resize: vertical; }
.fu-form-btns { display: flex; gap: 8px; justify-content: flex-end; }

.fu-metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
.fu-metric { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; padding: 12px; text-align: center; }
.fu-metric-val { font-size: 24px; font-weight: 800; letter-spacing: -1px; }
.fu-metric-label { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.3); margin-top: 3px; }

.fu-toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px); background: rgba(0,212,170,0.2); border: 1px solid rgba(0,212,170,0.3); color: #00d4aa; padding: 10px 20px; border-radius: 8px; font-size: 12px; font-weight: 600; z-index: 999; transition: transform 0.3s ease; backdrop-filter: blur(12px); }
.fu-toast.show { transform: translateX(-50%) translateY(0); }

/* Responsive */
@media (max-width: 600px) {
  .metrics { grid-template-columns: repeat(2, 1fr); }
  .fu-metrics { grid-template-columns: repeat(2, 1fr); }
  .lead-title { display: none; }
  .container { padding: 24px 16px; }
  .fu-row { flex-direction: column; }
  .fu-details { flex-direction: column; gap: 4px; }
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="header-top">
      <div class="logo">T</div>
      <h1>Outreach Command Center <span>/ LinkedIn</span></h1>
    </div>
    <p class="header-sub">Click copy. Paste into LinkedIn. Track your progress. Close deals.</p>
  </div>

  <div class="metrics">
    <div class="metric-card">
      <div class="metric-value white" id="m-total">19</div>
      <div class="metric-label">Total Leads</div>
    </div>
    <div class="metric-card">
      <div class="metric-value" id="m-sent">0</div>
      <div class="metric-label">Messages Sent</div>
    </div>
    <div class="metric-card">
      <div class="metric-value orange" id="m-remaining">19</div>
      <div class="metric-label">Remaining</div>
    </div>
    <div class="metric-card">
      <div class="metric-value" id="m-rate">0%</div>
      <div class="metric-label">Completion</div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-header">
      <span class="progress-title">Outreach Progress</span>
      <span class="progress-pct" id="progress-pct">0%</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" id="tab-queue" onclick="switchTab('queue')">Ready to Send <span class="tab-count" id="tc-queue">0</span></button>
    <button class="tab" id="tab-contacted" onclick="switchTab('contacted')">Contacted <span class="tab-count" id="tc-contacted">0</span></button>
    <button class="tab" id="tab-followup" onclick="switchTab('followup')">Follow-Up <span class="tab-count" id="tc-followup">0</span></button>
  </div>

  <div id="queue-view">
    <div id="leads"></div>
  </div>

  <div id="contacted-view" style="display:none;">
    <div id="contacted-leads"></div>
    <div class="empty-state" id="empty-contacted" style="display:none;">No contacted leads yet. Start sending!</div>
  </div>

  <div id="followup-view" style="display:none;">
    <div class="fu-metrics">
      <div class="fu-metric"><div class="fu-metric-val" style="color:#ef4444" id="fu-overdue">-</div><div class="fu-metric-label">Overdue</div></div>
      <div class="fu-metric"><div class="fu-metric-val" style="color:#f59e0b" id="fu-today">-</div><div class="fu-metric-label">Today</div></div>
      <div class="fu-metric"><div class="fu-metric-val" style="color:#00d4aa" id="fu-upcoming">-</div><div class="fu-metric-label">Upcoming</div></div>
      <div class="fu-metric"><div class="fu-metric-val" style="color:#fff" id="fu-total">-</div><div class="fu-metric-label">Active</div></div>
    </div>
    <div class="fu-filters" id="fu-filters">
      <button class="fu-filter active" data-fu="all">All</button>
      <button class="fu-filter" data-fu="fu-overdue">Overdue</button>
      <button class="fu-filter" data-fu="fu-due-today">Today</button>
      <button class="fu-filter" data-fu="fu-upcoming">Upcoming</button>
      <button class="fu-filter" data-fu="fu-done">Done</button>
    </div>
    <button class="fu-add-btn" onclick="fuToggleForm()">+ Add Follow-Up</button>
    <div class="fu-form" id="fuForm">
      <h3>New Follow-Up</h3>
      <div class="fu-row"><input type="text" id="fu-f-name" placeholder="Name *"><input type="text" id="fu-f-company" placeholder="Company"></div>
      <div class="fu-row">
        <select id="fu-f-method"><option value="email">Email</option><option value="linkedin">LinkedIn</option><option value="phone">Phone</option><option value="imessage">iMessage</option><option value="in-person">In Person</option></select>
        <input type="date" id="fu-f-date">
      </div>
      <div class="fu-row"><input type="text" id="fu-f-action" placeholder="Next action"></div>
      <div class="fu-row"><input type="email" id="fu-f-email" placeholder="Email"><input type="tel" id="fu-f-phone" placeholder="Phone"></div>
      <div class="fu-row"><textarea id="fu-f-notes" placeholder="Notes"></textarea></div>
      <div class="fu-form-btns"><button class="fu-btn fu-btn-secondary" onclick="fuToggleForm()">Cancel</button><button class="fu-btn fu-btn-primary" onclick="fuAdd()">Add</button></div>
    </div>
    <div id="fu-cards"></div>
  </div>
  <div class="fu-toast" id="fu-toast"></div>

  <div class="delete-bar">
    <button class="btn-delete-mode" id="btn-dm" onclick="toggleDeleteMode()">Delete</button>
    <button class="btn-select-all" id="btn-sa" onclick="toggleSelectAll()">Select All</button>
    <button class="btn-confirm-delete" id="btn-cd" onclick="confirmDelete()">Delete Selected</button>
    <span class="delete-count" id="delete-count"></span>
  </div>

  <button class="reset-btn" onclick="resetAll()">Reset All</button>
</div>

<script>
const templateCompany = `Hey {name},

Came across {company} — {compliment}.

I run Tethron. We install AI employees on dedicated hardware that run your business 24/7 — leads, operations, marketing, strategy, all of it. Not a chatbot. Not software. An actual employee that thinks about your business while you sleep.

I put together a breakdown of what your AI employee would do at {company} — want me to send it over?

Caden
tethron.ai`;

const templateBackground = `Hey {name},

Came across your background in {background} — {compliment}.

I run Tethron. We install AI employees on dedicated hardware that run your business 24/7 — leads, operations, marketing, strategy, all of it. Not a chatbot. Not software. An actual employee that thinks about your business while you sleep.

I put together a breakdown of what an AI employee would do for your business — want me to send it over?

Caden
tethron.ai`;

const leads = [
  { name: "Concetta Raz", company: "Upward On", title: "Founder/CEO — Executive Search for Real Estate Orgs", compliment: "love the niche focus on real estate exec search" },
  { name: "Brett A. Allren", company: "Claimify", title: "Co-Founder & CEO at Claimify", compliment: "Claimify's a smart concept" },
  { name: "Adarsh Doshi", background: "value creation and strategic operations", title: "Value Creation | Strategic Operator | AI-Enabled Scale Builder", compliment: "scaling operations at that level is impressive" },
  { name: "Stacey Mennillo Dieterle", background: "healthcare redesign and ecosystem innovation", title: "Redesigning Healthcare | Turning Challenges into Ecosystem Wins", compliment: "the ecosystem approach to healthcare challenges is fascinating" },

function copyMsg(i) {
  const lead = leads[i];
  const firstName = lead.name.split(' ')[0];
  const tpl = lead.company ? templateCompany : templateBackground;
  const msg = tpl
    .replace(/{name}/g, firstName)
    .replace(/{company}/g, lead.company || '')
    .replace(/{background}/g, lead.background || '')
    .replace(/{compliment}/g, lead.compliment);

  navigator.clipboard.writeText(msg).then(() => {
    // Brief visual feedback
    event.target.textContent = 'Copied!';
    event.target.classList.add('done');
    setTimeout(() => {
      event.target.textContent = 'Copy';
      event.target.classList.remove('done');
    }, 1500);
  });
}

  contactedState[i] = { date: new Date().toISOString() };
  localStorage.setItem('outreach_contacted_v3', JSON.stringify(contactedState));
  render();
}

function undoContacted(i) {
  delete contactedState[i];
  localStorage.setItem('outreach_contacted_v3', JSON.stringify(contactedState));
  render();
}

function toggleDeleteMode() {
  deleteMode = !deleteMode;
  selectedForDelete = {};
  document.getElementById('btn-dm').classList.toggle('active', deleteMode);
  document.getElementById('btn-sa').style.display = deleteMode ? 'inline-block' : 'none';
  document.getElementById('btn-sa').classList.remove('active');
  render();
}

function toggleSelect(i, checked) {
  if (checked) selectedForDelete[i] = true;
  else delete selectedForDelete[i];
  updateDeleteUI();
  // Update card highlight without full re-render
  document.querySelectorAll('.lead-card').forEach(card => {
    const cb = card.querySelector('.lead-checkbox');
    if (cb) card.classList.toggle('selected', cb.checked);
  });
}

function toggleSelectAll() {
  const visibleIndices = [];
  leads.forEach((_, i) => {
    if (deletedState[i]) return;
    const inQueue = !contactedState[i] && currentTab === 'queue';
    const inContacted = contactedState[i] && currentTab === 'contacted';
    if (inQueue || inContacted) visibleIndices.push(i);
  });

  const allSelected = visibleIndices.every(i => selectedForDelete[i]);
  if (allSelected) {
    visibleIndices.forEach(i => delete selectedForDelete[i]);
    document.getElementById('btn-sa').classList.remove('active');
  } else {
    visibleIndices.forEach(i => selectedForDelete[i] = true);
    document.getElementById('btn-sa').classList.add('active');
  }
  render();
}

function updateDeleteUI() {
  const count = Object.keys(selectedForDelete).length;
  const btnCD = document.getElementById('btn-cd');
  const delCount = document.getElementById('delete-count');
  if (deleteMode && count > 0) {
    btnCD.style.display = 'inline-block';
    btnCD.textContent = `Delete Selected (${count})`;
    delCount.style.display = 'inline';
    delCount.textContent = `${count} selected`;
  } else {
    btnCD.style.display = 'none';
    delCount.style.display = 'none';
  }
}

function confirmDelete() {
  const count = Object.keys(selectedForDelete).length;
  if (!confirm(`Permanently delete ${count} lead${count > 1 ? 's' : ''}?`)) return;
  Object.keys(selectedForDelete).forEach(i => {
    deletedState[i] = true;
    delete contactedState[i];
  });
  localStorage.setItem('outreach_deleted_v1', JSON.stringify(deletedState));
  localStorage.setItem('outreach_contacted_v3', JSON.stringify(contactedState));
  selectedForDelete = {};
  deleteMode = false;
  document.getElementById('btn-dm').classList.remove('active');
  document.getElementById('btn-sa').style.display = 'none';
  render();
}

function resetAll() {
  if (confirm('Reset all contacted status?')) {
    contactedState = {};
    localStorage.removeItem('outreach_contacted_v3');
    render();
  }
}

function fuUrgency(item) {
  if (item.status === 'done') return 'fu-done';
  if (!item.next_follow_up_date) return 'fu-upcoming';
  const today = new Date().toISOString().split('T')[0];
  if (item.next_follow_up_date < today) return 'fu-overdue';
  if (item.next_follow_up_date === today) return 'fu-due-today';
  return 'fu-upcoming';
}

function fuUrgencyOrder(u) { return { 'fu-overdue': 0, 'fu-due-today': 1, 'fu-upcoming': 2, 'fu-done': 3 }[u] ?? 4; }

function fuFormatDate(d) {
  if (!d) return '\u2014';
  const dt = new Date(d + 'T00:00:00');
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.round((dt - today) / 86400000);
  const label = dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Tomorrow';
  if (diff === -1) return 'Yesterday';
  if (diff < -1) return `${label} (${Math.abs(diff)}d ago)`;
  return `${label} (in ${diff}d)`;
}

  const c = document.getElementById('fu-cards');
  let items = [...fuData];
  items.forEach(i => i._u = fuUrgency(i));
  items.sort((a, b) => fuUrgencyOrder(a._u) - fuUrgencyOrder(b._u) || (a.next_follow_up_date || '').localeCompare(b.next_follow_up_date || ''));
  if (fuFilter !== 'all') items = items.filter(i => i._u === fuFilter);

  if (items.length === 0) { c.innerHTML = '<div class="empty-state">No follow-ups here.</div>'; return; }

  c.innerHTML = items.map(item => `
    <div class="fu-card ${item._u}">
      <div class="fu-top">
        <div><div class="fu-name">${fuEsc(item.name)}</div>${item.company ? `<div class="fu-company">${fuEsc(item.company)}</div>` : ''}</div>
        <div class="fu-badge ${item._u}">${item._u === 'fu-due-today' ? 'Today' : item._u.replace('fu-','')}</div>
      </div>
      <div class="fu-details">
        <div><strong>${fuMethodIcon(item.contact_method)} ${item.contact_method || 'email'}</strong></div>
        <div>Last: <strong>${fuFormatDate(item.last_contact_date)}</strong></div>
        <div>Next: <strong>${fuFormatDate(item.next_follow_up_date)}</strong></div>
      </div>
      ${item.next_action ? `<div class="fu-action">${fuEsc(item.next_action)}</div>` : ''}
      ${item.notes ? `<div class="fu-notes">${fuEsc(item.notes)}</div>` : ''}
      <div class="fu-btns">
        ${item.status !== 'done' ? `
          <button class="fu-btn fu-btn-primary" onclick="fuContacted('${item.id}')">Contacted Today</button>
          <button class="fu-btn fu-btn-snooze" onclick="fuSnooze('${item.id}')">Snooze 3d</button>
          <button class="fu-btn fu-btn-done" onclick="fuMarkDone('${item.id}')">Done</button>
        ` : `<button class="fu-btn fu-btn-secondary" onclick="fuReopen('${item.id}')">Reopen</button>`}
      </div>
    </div>
  `).join('');
}

async function fuLoad() {
  document.getElementById('fu-cards').innerHTML = '<div class="empty-state">Loading...</div>';
  fuData = await fuApi('follow_ups?order=next_follow_up_date.asc');
  fuUpdateMetrics();
  fuRender();
}

async function fuContacted(id) {
  const today = new Date().toISOString().split('T')[0];
  const next = new Date(); next.setDate(next.getDate() + 3);
  await fuApi(`follow_ups?id=eq.${id}`, { method: 'PATCH', body: { last_contact_date: today, next_follow_up_date: next.toISOString().split('T')[0] } });
  fuToast('Marked contacted'); fuLoad();
}

async function fuSnooze(id) {
  const next = new Date(); next.setDate(next.getDate() + 3);
  await fuApi(`follow_ups?id=eq.${id}`, { method: 'PATCH', body: { next_follow_up_date: next.toISOString().split('T')[0] } });
  fuToast('Snoozed 3 days'); fuLoad();
}

async function fuMarkDone(id) {
  await fuApi(`follow_ups?id=eq.${id}`, { method: 'PATCH', body: { status: 'done' } });
  fuToast('Done'); fuLoad();
}

async function fuReopen(id) {
  const today = new Date().toISOString().split('T')[0];
  await fuApi(`follow_ups?id=eq.${id}`, { method: 'PATCH', body: { status: 'pending', next_follow_up_date: today } });
  fuToast('Reopened'); fuLoad();
}

async function fuAdd() {
  const name = document.getElementById('fu-f-name').value.trim();
  if (!name) { fuToast('Name required'); return; }
  const today = new Date().toISOString().split('T')[0];
  await fuApi('follow_ups', { method: 'POST', body: {
    name, company: document.getElementById('fu-f-company').value.trim() || null,
    contact_method: document.getElementById('fu-f-method').value,
    next_follow_up_date: document.getElementById('fu-f-date').value || today,
    next_action: document.getElementById('fu-f-action').value.trim() || null,
    email: document.getElementById('fu-f-email').value.trim() || null,
    phone: document.getElementById('fu-f-phone').value.trim() || null,
    notes: document.getElementById('fu-f-notes').value.trim() || null,
    last_contact_date: today, status: 'pending'
  }});
  fuToast('Added'); fuToggleForm();
  document.querySelectorAll('#fuForm input, #fuForm textarea').forEach(el => el.value = '');
  fuLoad();
}

function fuToggleForm() { document.getElementById('fuForm').classList.toggle('show'); }

function fuToast(msg) {
  const t = document.getElementById('fu-toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

document.querySelectorAll('.fu-filter').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.fu-filter').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    fuFilter = btn.dataset.fu;
    fuRender();
  });
});

// Load follow-up count on page load
fuApi('follow_ups?status=neq.done&select=id').then(d => {
  document.getElementById('tc-followup').textContent = Array.isArray(d) ? d.length : 0;
});

// Register service worker for PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/outreach-sw.js').catch(() => {});
}
</script>
</body>
</html>
