<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
body {
  width: 1200px;
  height: 630px;
  overflow: hidden;
  background: rgb(7, 8, 10);
  font-family: 'Inter', sans-serif;
}
.card {
  position: relative;
  width: 1200px;
  height: 630px;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}
.blob { position: absolute; border-radius: 50%; filter: blur(70px); opacity: 1; }
.blob-1 { width: 700px; height: 600px; background: radial-gradient(circle, rgba(0,212,170,0.28) 0%, transparent 70%); top: -200px; left: -150px; }
.blob-2 { width: 800px; height: 600px; background: radial-gradient(circle, rgba(0,180,148,0.22) 0%, transparent 70%); bottom: -200px; right: -200px; }
.blob-3 { width: 500px; height: 400px; background: radial-gradient(circle, rgba(10,154,135,0.15) 0%, transparent 65%); top: 50%; left: 50%; transform: translate(-50%,-50%); }
.noise { position: absolute; inset: 0; opacity: 0.03; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); background-size: 128px; }
.vignette { position: absolute; inset: 0; background: radial-gradient(ellipse 85% 85% at 50% 50%, transparent 40%, rgba(7,8,10,0.5) 100%); z-index: 1; }
.content {
  position: relative; z-index: 2;
  display: flex; flex-direction: column; align-items: center; text-align: center; gap: 24px;
}
.logo-svg { width: 80px; height: 80px; filter: drop-shadow(0 0 25px rgba(0,212,170,0.5)) drop-shadow(0 0 60px rgba(0,212,170,0.2)); }
.logo-name { font-size: 56px; font-weight: 800; color: white; letter-spacing: 6px; }
.tagline { font-size: 28px; font-weight: 600; color: rgba(255,255,255,0.7); }
.tagline span { color: #00d4aa; }
.url { font-size: 18px; font-weight: 500; color: rgba(255,255,255,0.3); letter-spacing: 1px; margin-top: 8px; }
</style>
</head>
<body>
<div class="card">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="noise"></div>
  <div class="vignette"></div>
  <div class="content">
    <svg class="logo-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
      <defs><linearGradient id="grad" x1="18%" y1="8%" x2="82%" y2="92%"><stop offset="0%" stop-color="#1FE0D0"/><stop offset="45%" stop-color="#18CEC0"/><stop offset="100%" stop-color="#0A9A87"/></linearGradient></defs>
      <polygon points="512,120 160,850 864,850" fill="none" stroke="url(#grad)" stroke-width="44" stroke-linejoin="round"/>
      <polygon points="512,275.73 272.64,772.13 751.36,772.13" fill="none" stroke="url(#grad)" stroke-width="30" stroke-linejoin="round"/>
    </svg>
    <div class="logo-name">TETHRON</div>
    <div class="tagline">We install <span>AI employees</span> that run your business.</div>
    <div class="url">tethron.ai</div>
  </div>
</div>
</body>
</html>
