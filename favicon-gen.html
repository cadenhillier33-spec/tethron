<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 512px; height: 512px; overflow: hidden; background: rgb(7, 8, 10); display: flex; align-items: center; justify-content: center; }
.wrap { position: relative; width: 512px; height: 512px; display: flex; align-items: center; justify-content: center; background: rgb(7, 8, 10); border-radius: 100px; }
.glow { position: absolute; width: 300px; height: 300px; background: radial-gradient(circle, rgba(0,212,170,0.15) 0%, transparent 70%); border-radius: 50%; filter: blur(40px); }
svg { width: 320px; height: 320px; position: relative; z-index: 1; filter: drop-shadow(0 0 15px rgba(0,212,170,0.4)); }
</style>
</head>
<body>
<div class="wrap">
  <div class="glow"></div>
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
    <defs><linearGradient id="grad" x1="18%" y1="8%" x2="82%" y2="92%"><stop offset="0%" stop-color="#1FE0D0"/><stop offset="45%" stop-color="#18CEC0"/><stop offset="100%" stop-color="#0A9A87"/></linearGradient></defs>
    <polygon points="512,120 160,850 864,850" fill="none" stroke="url(#grad)" stroke-width="44" stroke-linejoin="round"/>
    <polygon points="512,275.73 272.64,772.13 751.36,772.13" fill="none" stroke="url(#grad)" stroke-width="30" stroke-linejoin="round"/>
  </svg>
</div>
</body>
</html>
