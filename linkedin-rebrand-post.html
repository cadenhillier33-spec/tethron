<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
body {
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  background: rgb(7, 8, 10);
  font-family: 'Inter', sans-serif;
}
.card {
  position: relative;
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* Blobs */
.blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 1;
}
.blob-1 {
  width: 700px;
  height: 700px;
  background: radial-gradient(circle, rgba(0,212,170,0.25) 0%, rgba(0,212,170,0.06) 45%, transparent 70%);
  top: -200px;
  left: -200px;
}
.blob-2 {
  width: 800px;
  height: 800px;
  background: radial-gradient(circle, rgba(0,180,148,0.2) 0%, rgba(0,180,148,0.05) 45%, transparent 70%);
  bottom: -250px;
  right: -200px;
}
.blob-3 {
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(10,154,135,0.18) 0%, transparent 65%);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}
.blob-4 {
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(31,224,208,0.12) 0%, transparent 60%);
  top: -100px;
  right: 10%;
}
.blob-5 {
  width: 450px;
  height: 450px;
  background: radial-gradient(circle, rgba(0,212,170,0.15) 0%, transparent 60%);
  bottom: -100px;
  left: 15%;
}

.noise {
  position: absolute;
  inset: 0;
  opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 128px 128px;
}

.vignette {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 75% 75% at 50% 50%, transparent 40%, rgba(7,8,10,0.5) 100%);
  z-index: 1;
  pointer-events: none;
}

.content {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding: 0 80px;
  gap: 40px;
}

/* Top tag */
.tag {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 24px;
  border: 1px solid rgba(0,212,170,0.2);
  border-radius: 100px;
  font-size: 14px;
  font-weight: 600;
  color: #00d4aa;
  letter-spacing: 2px;
  text-transform: uppercase;
  background: rgba(0,212,170,0.05);
}
.tag-dot {
  width: 8px;
  height: 8px;
  background: #00d4aa;
  border-radius: 50%;
}

/* Logo */
.logo-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}
.logo-svg {
  width: 90px;
  height: 90px;
  filter: drop-shadow(0 0 25px rgba(0,212,170,0.5)) drop-shadow(0 0 60px rgba(0,212,170,0.2));
}
.logo-name {
  font-size: 64px;
  font-weight: 800;
  color: white;
  letter-spacing: 6px;
}

/* Headline */
.headline {
  font-size: 42px;
  font-weight: 700;
  color: white;
  line-height: 1.25;
  letter-spacing: -0.5px;
}
.headline .accent {
  color: #00d4aa;
}

/* Divider */
.divider {
  width: 60px;
  height: 2px;
  background: linear-gradient(90deg, transparent, #00d4aa, transparent);
}

/* Stats row */
.stats {
  display: flex;
  gap: 48px;
}
.stat {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}
.stat-num {
  font-size: 48px;
  font-weight: 800;
  color: #00d4aa;
  letter-spacing: -1px;
}
.stat-label {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.4);
}

/* URL */
.url {
  font-size: 20px;
  font-weight: 600;
  color: rgba(255,255,255,0.35);
  letter-spacing: 1px;
}
.url span {
  color: #00d4aa;
}
</style>
</head>
<body>
<div class="card">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="blob blob-4"></div>
  <div class="blob blob-5"></div>
  <div class="noise"></div>
  <div class="vignette"></div>

  <div class="content">
    <div class="tag"><div class="tag-dot"></div> Announcement</div>

    <div class="logo-area">
      <svg class="logo-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
        <defs>
          <linearGradient id="grad" x1="18%" y1="8%" x2="82%" y2="92%">
            <stop offset="0%" stop-color="#1FE0D0"/>
            <stop offset="45%" stop-color="#18CEC0"/>
            <stop offset="100%" stop-color="#0A9A87"/>
          </linearGradient>
        </defs>
        <polygon points="512,120 160,850 864,850" fill="none" stroke="url(#grad)" stroke-width="44" stroke-linejoin="round"/>
        <polygon points="512,275.73 272.64,772.13 751.36,772.13" fill="none" stroke="url(#grad)" stroke-width="30" stroke-linejoin="round"/>
      </svg>
      <div class="logo-name">TETHRON</div>
    </div>

    <div class="headline">New name. Bigger team.<br><span class="accent">Same mission.</span></div>

    <div class="divider"></div>

    <div class="stats">
      <div class="stat">
        <div class="stat-num">5</div>
        <div class="stat-label">New Hires</div>
      </div>
      <div class="stat">
        <div class="stat-num">47+</div>
        <div class="stat-label">AI Employees<br>Installed</div>
      </div>
      <div class="stat">
        <div class="stat-num">24/7</div>
        <div class="stat-label">Always<br>Running</div>
      </div>
    </div>

    <div class="url"><span>tethron.ai</span></div>
  </div>
</div>
</body>
</html>
